# =====================================================
# Redis Configuration for AGS Break Tracker
# =====================================================

# Network
bind 0.0.0.0
port 6379

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes

# Security
# requirepass (set via REDIS_PASSWORD env var if needed)

# Logging
loglevel notice

# General
daemonize no
supervised no
appendonly no
