# =====================================================
# AGS Break Tracker - Production Docker Compose
# =====================================================
# Usage: docker-compose up -d
# =====================================================

services:
  # =====================================================
  # Laravel Application
  # =====================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ags-app
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://localhost:8081
    env_file:
      - .env
    volumes:
      - app-storage:/var/www/html/storage
      - ./docker/nginx.conf:/etc/nginx/http.d/nginx.conf:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ags-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # =====================================================
  # MySQL Database
  # =====================================================
  mysql:
    image: mysql:8.0
    container_name: ags-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-agsprod2026}
      MYSQL_DATABASE: ${DB_DATABASE:-ags_tracker}
      MYSQL_USER: ${DB_USERNAME:-agsuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-agsprod2026}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql.cnf:/etc/mysql/conf.d/custom.cnf:ro
    networks:
      - ags-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # =====================================================
  # Redis Cache
  # =====================================================
  redis:
    image: redis:7-alpine
    container_name: ags-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - ./docker/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - ags-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =====================================================
  # Workspace (for artisan commands)
  # =====================================================
  workspace:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ags-workspace
    restart: "no"
    env_file:
      - .env
    volumes:
      - app-storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ags-network
    entrypoint: ["sleep", "infinity"]

# =====================================================
# Networks
# =====================================================
networks:
  ags-network:
    driver: bridge

# =====================================================
# Volumes
# =====================================================
volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  app-storage:
    driver: local
