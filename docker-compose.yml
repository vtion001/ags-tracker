services:
  nginx:
    image: nginx:alpine
    container_name: ags-nginx
    ports:
      - "0.0.0.0:8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - ags-network

  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ags-php
    env_file:
      - .env
    volumes:
      - ags-storage:/var/www/html/storage
      - ags-bootstrap-cache:/var/www/html/bootstrap/cache
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ags-network
    environment:
      - APP_ENV=production
      - APP_DEBUG=false

  mysql:
    image: mysql:8.0
    container_name: ags-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: agslocal2026
      MYSQL_DATABASE: ags_tracker
    volumes:
      - ags-mysql-data:/var/lib/mysql
    networks:
      - ags-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ags-redis
    ports:
      - "6380:6379"
    volumes:
      - ags-redis-data:/data
    networks:
      - ags-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  workspace:
    image: agssupabase-php
    container_name: ags-workspace
    env_file:
      - .env
    volumes:
      - ags-storage:/var/www/html/storage
      - ags-bootstrap-cache:/var/www/html/bootstrap/cache
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ags-network
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    entrypoint: ['sleep', 'infinity']

networks:
  ags-network:
    driver: bridge

volumes:
  ags-mysql-data:
  ags-redis-data:
  ags-storage:
  ags-bootstrap-cache:
